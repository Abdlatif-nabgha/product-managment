<!DOCTYPE html>
<html
lang="en"
xmlns:th="http://www.thymeleaf.org"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
layout:decorate="layout1"
>
<head>
  <meta charset="UTF-8">
  <title>Not Authorized</title>
</head>
<body class="bg-light">
<div class="container text-center mt-5" layout:fragment="content1">
  <div class="alert alert-danger" role="alert">
    <h1 class="display-4">403 - Access Denied</h1>
    <p class="lead">You do not have permission to do this action.</p>
    <hr>
    <p>Please contact your administrator or return to the home page.</p>
    <a th:href="@{/user/index}" class="btn btn-primary">Go Home</a>
  </div>
</div>
</body>
</html>
