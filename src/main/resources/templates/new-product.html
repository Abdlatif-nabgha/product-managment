<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout1"
>
<head>
    <meta charset="UTF-8">
    <title th:text="${product.id == null ? 'New Product' : 'Edit Product'}"></title>
</head>
<body>
<div class="p-3" layout:fragment="content1">
    <h3 th:text="${product.id == null ? 'New Product' : 'Edit Product'}"></h3>
    <form method="post" th:action="@{/admin/saveProduct}">
        <input type="hidden" name="id" th:value="${product.id}">
        <div class="mb-3">
            <label class="form-label" for="name">Name</label>
            <input class="form-control" id="name" name="name" th:value="${product.name}" type="text">
            <span class="text-danger" th:errors="${product.name}"></span>
        </div>
        <div class="mb-3">
            <label class="form-label" for="price">Price</label>
            <input class="form-control" id="price" name="price" th:value="${product.price}" type="number">
            <span class="text-danger" th:errors="${product.price}"></span>
        </div>
        <div class="mb-3">
            <label class="form-label" for="quantity">Quantity</label>
            <input class="form-control" id="quantity" name="quantity" th:value="${product.quantity}" type="number">
            <span class="text-danger" th:errors="${product.quantity}"></span>
        </div>
        <button type="submit" class="btn btn-primary" th:text="${product.id == null ? 'Save' : 'Update'}"></button>
    </form>
</div>
</body>
</html>
